<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>VACCINE DISTRIBUTION TERMINAL</title>

    <style>
        body {
            background: radial-gradient(circle, #0b140b, #020402);
            color: #7CFF00;
            font-family: monospace;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        /* 扫描线 */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(to bottom,
                    rgba(0, 255, 0, 0.03),
                    rgba(0, 255, 0, 0.03) 2px,
                    transparent 2px,
                    transparent 4px);
        }

        /* 选择区域动画 */
        .fadeOut {
            animation: fadeOut 0.8s forwards;
        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
                transform: scale(1);
            }

            100% {
                opacity: 0;
                transform: scale(0.95);
            }
        }

        h1 {
            letter-spacing: 2px;
            text-shadow: 0 0 10px #7CFF00;
        }

        .subtitle {
            color: #9bd49b;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .slot {
            background: rgba(0, 40, 0, 0.3);
            border-radius: 12px;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid rgba(124, 255, 0, 0.3);
            box-shadow: 0 0 10px rgba(124, 255, 0, 0.2),
                inset 0 0 10px rgba(124, 255, 0, 0.1);
        }

        select {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background: black;
            color: #7CFF00;
            border-radius: 8px;
            border: 1px solid rgba(124, 255, 0, 0.5);
        }

        button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            margin-top: 20px;
            background: linear-gradient(90deg, #56ff00, #aaff00);
            border: none;
            border-radius: 10px;
            color: black;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(124, 255, 0, 0.5);
        }

        #ending {
            margin-top: 40px;
            padding: 20px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(124, 255, 0, 0.5);
            box-shadow: 0 0 20px rgba(124, 255, 0, 0.3);
            display: none;
            min-height: 120px;
        }

        .good {
            color: #7CFF00;
            font-size: 24px;
            text-shadow: 0 0 10px #7CFF00;
        }

        .bad {
            color: #ff4d4d;
            font-size: 24px;
            text-shadow: 0 0 10px red;
        }

        .extra {
            color: #00ffff;
            margin-top: 10px;
        }

        .flash {
            animation: flash 0.2s 4;
        }

        @keyframes flash {
            0% {
                background: black;
            }

            50% {
                background: #003300;
            }

            100% {
                background: black;
            }
        }
    </style>

</head>

<body>

    <div class="scanline"></div>

    <h1>VACCINE DISTRIBUTION TERMINAL</h1>

    <div class="subtitle">
        Select 8 individuals to vaccinate
    </div>

    <!-- 可隐藏区域 -->
    <div id="selectionArea">

        <div id="slots"></div>

        <button onclick="startSimulation()" id="confirmBtn">
            CONFIRM VACCINATION
        </button>

    </div>

    <!-- 结局 -->
    <div id="ending"></div>

    <script>

        const people = [

            "Mr.Brown", "Mrs.Brown", "Brown Jr", "Mr.Foster", "Mrs.Foster",
            "Mr.Owens", "Mrs.Owens", "Owens Jr", "William Harris", "Mr.Parker",
            "Mrs.Parker", "Mrs.Quinn", "Mr.Smith", "Mrs.Smith", "Miss.Christine",
            "Grandpapa Thompson", "Grandmama Thompson", "Mr.Copper", "Ms.Nelson", "Mr.King"

        ]

        const required = [
            "Brown Jr", "Mr.Parker", "Mrs.Quinn", "Mr.Owens", "Mr.Smith"
        ]

        const allergy = [
            "William Harris", "Mrs.Owens", "Mrs.Parker", "Mrs.Foster"
        ]


        // 创建选择框
        for (let i = 0; i < 8; i++) {

            let div = document.createElement("div")
            div.className = "slot"

            let select = document.createElement("select")
            select.id = "slot" + i
            select.onchange = updateOptions

            select.add(new Option("Select person " + (i + 1), ""))

            people.forEach(p => {
                select.add(new Option(p, p))
            })

            div.appendChild(select)
            document.getElementById("slots").appendChild(div)

        }


        // 防止重复选择
        function updateOptions() {

            let selected = []

            for (let i = 0; i < 8; i++) {

                let v = document.getElementById("slot" + i).value
                if (v != "") selected.push(v)

            }

            for (let i = 0; i < 8; i++) {

                let select = document.getElementById("slot" + i)
                let current = select.value

                for (let opt of select.options) {

                    if (opt.value == "") continue

                    opt.disabled = selected.includes(opt.value)
                        && opt.value != current

                }

            }

        }


        // 开始模拟
        function startSimulation() {

            let chosen = []

            for (let i = 0; i < 8; i++) {

                let v = document.getElementById("slot" + i).value

                if (v == "") {
                    alert("Select 8 individuals")
                    return
                }

                chosen.push(v)

            }


            // 隐藏选择区域
            let area = document.getElementById("selectionArea")

            area.classList.add("fadeOut")

            setTimeout(() => {
                area.style.display = "none"
            }, 800)


            document.body.classList.add("flash")

            let ending = document.getElementById("ending")

            ending.style.display = "block"

            ending.innerHTML = ""

            typeLine("Injecting vaccines...")
            setTimeout(() => typeLine("Analyzing transmission network..."), 1200)
            setTimeout(() => typeLine("Simulating outbreak..."), 2400)
            setTimeout(() => showResult(chosen), 4000)

        }


        // 打字效果
        function typeLine(text) {

            let div = document.createElement("div")

            document.getElementById("ending").appendChild(div)

            let i = 0

            let interval = setInterval(() => {

                div.innerHTML = text.substring(0, i)

                i++

                if (i > text.length) clearInterval(interval)

            }, 30)

        }


        function showResult(chosen) {

            let ending = document.getElementById("ending")

            // 计算是否达成好结局
            let good = required.every(p => chosen.includes(p))

            let result = document.createElement("div")

            if (good) {

                result.className = "good"
                result.innerHTML = "<br>HERD IMMUNITY ACHIEVED"

            } else {

                result.className = "bad"
                result.innerHTML = "<br>PANDEMIC UNCONTROLLED"

            }

            ending.appendChild(result)


            // 再计算过敏死亡（不会影响上面的显示）
            let deaths = chosen.filter(person => allergy.includes(person))

            if (deaths.length > 0) {

                let warningTitle = document.createElement("div")
                warningTitle.className = "bad"
                warningTitle.style.marginTop = "20px"

                warningTitle.innerHTML =
                    "<br>VACCINE REACTION DETECTED<br>" +
                    deaths.length + " INDIVIDUAL(S) DECEASED"

                ending.appendChild(warningTitle)


                let nameDiv = document.createElement("div")
                nameDiv.className = "extra"
                nameDiv.innerHTML = "Fatalities: " + deaths.join(", ")

                ending.appendChild(nameDiv)

            }

        }

    </script>

</body>

</html>
